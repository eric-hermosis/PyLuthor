name: CD
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest   
    steps:
    - name: Checkout Repository  
      uses: actions/checkout@v3

    - name: Publish Package
      uses: celsiusnarhwal/poetry-publish@v2
      with:
        python-version: 3.13
        poetry-version: 2.3.2
        token: ${{ secrets.PYPI_TOKEN }}
        build: true

